name: Deploy to EC2 (Rsync Version)

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出程式碼
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. PHP 前置作業 (測試用)
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, pgsql, sqlite3, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env for testing
        run: cp .env.testing .env

      - name: Generate application key
        run: php artisan key:generate

      # 3. 前端建構
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # 4. Rsync 部署前端資源 (關鍵修改)
      - name: Sync assets to EC2
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          ARGS: "-avz --delete"
          SOURCE: "public/build/"
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USERNAME }}
          # ⚠️ 請將 your-project 修改為你實際的目錄名稱
          TARGET: "/var/www/tao_among/public/build/"
          SCRIPT_BEFORE: "mkdir -p /var/www/tao_among/public/build"

      # 5. SSH 連線執行部署指令
      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e  #
            PROJECT_PATH="/var/www/tao_among" # ⚠️ 請修改這裡

            echo "🚀 開始部署後端邏輯..."
            cd $PROJECT_PATH

            # 清除本地可能產生的異動 (防止檔案衝突)
            git reset --hard HEAD
            
            # 拉取最新程式碼 (不包含已被 ignore 的 public/build，所以不會衝突)
            git pull origin main

            # 安裝依賴
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            # 執行遷移與優化
            php artisan migrate --force
            php artisan config:cache
            php artisan event:cache
            php artisan route:cache
            php artisan view:cache

            # 確保權限
            sudo chown -R ec2-user:nginx storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            # 重啟服務
            sudo systemctl reload php-fpm

            echo "✅ 部署完成！"
