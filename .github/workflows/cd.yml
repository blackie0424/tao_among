name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: /var/www/tao_among
  FRONTEND_BUILD_PATH: public/build/
  FRONTEND_TARGET_PATH: /var/www/tao_among/public/build/
  PHP_FPM_SERVICE: php-fpm
  APP_USER: ec2-user
  APP_GROUP: nginx

jobs:
  deploy-frontend:
    name: Deploy frontend assets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Sync frontend assets to EC2
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          ARGS: -avz --delete
          SOURCE: ${{ env.FRONTEND_BUILD_PATH }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USERNAME }}
          REMOTE_PORT: 22
          SSH_CMD_ARGS: -o StrictHostKeyChecking=no -o ConnectTimeout=10
          TARGET: ${{ env.FRONTEND_TARGET_PATH }}
          SCRIPT_BEFORE: mkdir -p ${{ env.FRONTEND_TARGET_PATH }}

  deploy-backend:
    name: Deploy Laravel backend
    needs: deploy-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Execute remote deploy script
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -euo pipefail

            cd "${{ env.PROJECT_PATH }}"

            git fetch --prune origin main
            git reset --hard origin/main

            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            php artisan migrate --force
            php artisan config:cache
            php artisan event:cache
            php artisan route:cache
            php artisan view:cache

            sudo chown -R "${{ env.APP_USER }}:${{ env.APP_GROUP }}" storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            sudo systemctl reload "${{ env.PHP_FPM_SERVICE }}"
